<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FireSentinel — Đăng nhập</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #060b18;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative
    }

    /* Animated background */
    .bg-particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(249, 115, 22, 0.15);
      animation: float 15s infinite ease-in-out
    }

    .particle:nth-child(1) {
      width: 300px;
      height: 300px;
      top: -50px;
      left: -50px;
      animation-delay: 0s
    }

    .particle:nth-child(2) {
      width: 200px;
      height: 200px;
      bottom: -30px;
      right: -30px;
      background: rgba(239, 68, 68, 0.1);
      animation-delay: 3s
    }

    .particle:nth-child(3) {
      width: 150px;
      height: 150px;
      top: 50%;
      left: 60%;
      background: rgba(56, 189, 248, 0.08);
      animation-delay: 6s
    }

    .particle:nth-child(4) {
      width: 100px;
      height: 100px;
      top: 20%;
      right: 20%;
      background: rgba(249, 115, 22, 0.1);
      animation-delay: 9s
    }

    @keyframes float {

      0%,
      100% {
        transform: translate(0, 0) scale(1)
      }

      25% {
        transform: translate(30px, -30px) scale(1.1)
      }

      50% {
        transform: translate(-20px, 20px) scale(0.9)
      }

      75% {
        transform: translate(20px, 10px) scale(1.05)
      }
    }

    /* Grid overlay */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: linear-gradient(rgba(249, 115, 22, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(249, 115, 22, 0.03) 1px, transparent 1px);
      background-size: 50px 50px
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 20px
    }

    /* Logo */
    .login-logo {
      text-align: center;
      margin-bottom: 36px
    }

    .login-logo .icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, #f97316, #ef4444);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(249, 115, 22, 0.3);
      animation: glow-pulse 3s infinite
    }

    @keyframes glow-pulse {

      0%,
      100% {
        box-shadow: 0 8px 32px rgba(249, 115, 22, 0.3)
      }

      50% {
        box-shadow: 0 8px 48px rgba(249, 115, 22, 0.5)
      }
    }

    .login-logo h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px
    }

    .login-logo h1 span {
      background: linear-gradient(135deg, #f97316, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent
    }

    .login-logo p {
      color: #64748b;
      font-size: 14px;
      margin-top: 6px
    }

    /* Card */
    .login-card {
      background: rgba(17, 24, 39, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 36px 32px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4)
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px
    }

    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: #64748b;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      border-radius: 8px;
      transition: all .3s
    }

    .tab.active {
      background: linear-gradient(135deg, #f97316, #ef4444);
      color: #fff;
      box-shadow: 0 4px 16px rgba(249, 115, 22, 0.3)
    }

    /* Form */
    .form-group {
      margin-bottom: 18px
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .5px
    }

    .input-wrap {
      position: relative
    }

    .input-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      font-size: 14px
    }

    .form-input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: rgba(255, 255, 255, 0.05);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: #f1f5f9;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: all .3s
    }

    .form-input:focus {
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15)
    }

    .form-input::placeholder {
      color: #475569
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 12px
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #94a3b8;
      cursor: pointer
    }

    .remember input {
      accent-color: #f97316
    }

    .forgot {
      color: #f97316;
      text-decoration: none;
      font-weight: 500
    }

    .forgot:hover {
      text-decoration: underline
    }

    /* Button */
    .btn-login {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #f97316, #ef4444);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all .3s;
      position: relative;
      overflow: hidden
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(249, 115, 22, 0.4)
    }

    .btn-login:active {
      transform: scale(0.98)
    }

    .btn-login.loading {
      pointer-events: none;
      opacity: 0.8
    }

    .btn-login .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin: 0 auto
    }

    .btn-login.loading .spinner {
      display: block
    }

    .btn-login.loading .btn-text {
      display: none
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: #475569;
      font-size: 12px
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.08)
    }

    /* Social */
    .social-btns {
      display: flex;
      gap: 10px
    }

    .btn-social {
      flex: 1;
      padding: 12px;
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      color: #94a3b8;
      font-size: 18px;
      cursor: pointer;
      transition: all .3s;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .btn-social:hover {
      border-color: #f97316;
      color: #f97316;
      background: rgba(249, 115, 22, 0.05)
    }

    /* Alert */
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px
    }

    .alert.error {
      display: flex;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5
    }

    .alert.success {
      display: flex;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
      color: #86efac
    }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #475569
    }

    .login-footer a {
      color: #f97316;
      text-decoration: none;
      font-weight: 600
    }

    /* Register extras */
    .register-form {
      display: none
    }

    .password-strength {
      height: 3px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden
    }

    .password-strength-fill {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      transition: all .3s
    }
  </style>
</head>

<body>
  <div class="bg-particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>
  <div class="grid-overlay"></div>

  <div class="login-container">
    <div class="login-logo">
      <div class="icon">🔥</div>
      <h1>Fire<span>Sentinel</span></h1>
      <p>Hệ thống giám sát & cảnh báo cháy thông minh</p>
    </div>

    <div class="login-card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Đăng nhập</button>
        <button class="tab" onclick="switchTab('register')">Đăng ký</button>
      </div>

      <div id="alertBox" class="alert"></div>

      <!-- LOGIN FORM -->
      <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input class="form-input" type="email" id="loginEmail" placeholder="admin@firesentinel.vn" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Mật khẩu</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" required>
          </div>
        </div>
        <div class="form-options">
          <label class="remember"><input type="checkbox"> Ghi nhớ</label>
          <a href="#" class="forgot">Quên mật khẩu?</a>
        </div>
        <button class="btn-login" type="submit" id="btnLogin">
          <span class="btn-text">Đăng nhập bảo mật</span>
          <div class="spinner"></div>
        </button>
      </form>

      <!-- REGISTER FORM -->
      <form class="register-form" id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label">Họ và tên</label>
          <div class="input-wrap">
            <i class="fas fa-user"></i>
            <input class="form-input" type="text" id="regName" placeholder="Nguyễn Văn A" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input class="form-input" type="email" id="regEmail" placeholder="email@example.com" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Mật khẩu</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input class="form-input" type="password" id="regPassword" placeholder="Tối thiểu 6 ký tự" required
              oninput="checkStrength(this.value)">
          </div>
          <div class="password-strength">
            <div class="password-strength-fill" id="strengthBar"></div>
          </div>
        </div>
        <button class="btn-login" type="submit" id="btnRegister" style="margin-top:8px">
          <span class="btn-text">Tạo tài khoản</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="divider">hoặc đăng nhập với</div>
      <div class="social-btns">
        <button class="btn-social" onclick="googleLogin()" title="Google"><i class="fab fa-google"></i></button>
        <button class="btn-social" title="GitHub"><i class="fab fa-github"></i></button>
        <button class="btn-social" title="Phone"><i class="fas fa-phone"></i></button>
      </div>
    </div>

    <div class="login-footer">
      <p>🔒 Bảo mật bởi Firebase Authentication</p>
    </div>
  </div>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyCm0oE0pS3d3Ak7s0qyx-zm5IS0TVsWsK0",
      authDomain: "baochay-e788a.firebaseapp.com",
      databaseURL: "https://baochay-e788a-default-rtdb.firebaseio.com",
      projectId: "baochay-e788a",
      storageBucket: "baochay-e788a.firebasestorage.app",
      messagingSenderId: "103010478177",
      appId: "1:103010478177:web:cd3421b65e079995b7e220"
    });

    // Check if already logged in
    firebase.auth().onAuthStateChanged(user => {
      if (user) window.location.href = 'index.html';
    });

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (tab === 'login' ? i === 0 : i === 1)));
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
      hideAlert();
    }

    function showAlert(msg, type) {
      const a = document.getElementById('alertBox');
      a.className = 'alert ' + type;
      a.innerHTML = '<i class="fas fa-' + (type === 'error' ? 'exclamation-circle' : 'check-circle') + '"></i>' + msg;
    }
    function hideAlert() { document.getElementById('alertBox').className = 'alert'; }

    function setLoading(btn, loading) {
      btn.classList.toggle('loading', loading);
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btnLogin');
      setLoading(btn, true);
      try {
        await firebase.auth().signInWithEmailAndPassword(
          document.getElementById('loginEmail').value,
          document.getElementById('loginPassword').value
        );
        showAlert('Đăng nhập thành công! Đang chuyển hướng...', 'success');
        setTimeout(() => window.location.href = 'index.html', 1000);
      } catch (err) {
        const msgs = {
          'auth/user-not-found': 'Email không tồn tại',
          'auth/wrong-password': 'Sai mật khẩu',
          'auth/invalid-email': 'Email không hợp lệ',
          'auth/too-many-requests': 'Quá nhiều lần thử, vui lòng đợi'
        };
        showAlert(msgs[err.code] || err.message, 'error');
      }
      setLoading(btn, false);
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('btnRegister');
      setLoading(btn, true);
      try {
        const cred = await firebase.auth().createUserWithEmailAndPassword(
          document.getElementById('regEmail').value,
          document.getElementById('regPassword').value
        );
        await cred.user.updateProfile({ displayName: document.getElementById('regName').value });
        showAlert('Tạo tài khoản thành công!', 'success');
        setTimeout(() => window.location.href = 'index.html', 1000);
      } catch (err) {
        const msgs = {
          'auth/email-already-in-use': 'Email đã được sử dụng',
          'auth/weak-password': 'Mật khẩu quá yếu (tối thiểu 6 ký tự)',
          'auth/invalid-email': 'Email không hợp lệ'
        };
        showAlert(msgs[err.code] || err.message, 'error');
      }
      setLoading(btn, false);
    }

    async function googleLogin() {
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        await firebase.auth().signInWithPopup(provider);
        window.location.href = 'index.html';
      } catch (err) { showAlert(err.message, 'error'); }
    }

    function checkStrength(pw) {
      const bar = document.getElementById('strengthBar');
      let s = 0;
      if (pw.length >= 6) s++;
      if (pw.length >= 10) s++;
      if (/[A-Z]/.test(pw)) s++;
      if (/[0-9]/.test(pw)) s++;
      if (/[^A-Za-z0-9]/.test(pw)) s++;
      const pct = s * 20;
      const colors = ['#ef4444', '#ef4444', '#eab308', '#22c55e', '#22c55e', '#22c55e'];
      bar.style.width = pct + '%';
      bar.style.background = colors[s];
    }
  </script>
</body>

</html>
